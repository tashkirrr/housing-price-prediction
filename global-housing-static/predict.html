<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Prediction - EstatePredict</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">🏠</span>
                <span class="logo-text">Estate<span class="logo-accent">Predict</span></span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="explore.html">Explore</a></li>
                <li><a href="predict.html" class="active">Predict</a></li>
                <li><a href="countries.html">Countries</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
            <div class="nav-actions">
                <a href="predict.html" class="btn btn-primary">Get Estimate</a>
            </div>
            <button class="nav-toggle" onclick="toggleNav()">☰</button>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1>Property Price Prediction</h1>
            <p>Get an instant, accurate estimate for any property worldwide.</p>
        </div>
    </header>

    <section class="featured-section">
        <div class="container">
            <div style="max-width: 700px; margin: 0 auto;">
                <!-- Form -->
                <form id="predictionForm" style="background: var(--white); border-radius: var(--radius-xl); padding: 2.5rem; box-shadow: var(--shadow-lg);">
                    <h3 style="font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--gray-200);">📍 Location</h3>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                        <div class="form-group">
                            <label style="display: block; font-size: 0.875rem; font-weight: 500; color: var(--gray-600); margin-bottom: 0.5rem;">Country</label>
                            <select id="country" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--gray-300); border-radius: var(--radius); font-size: 0.9375rem;">
                                <option value="">Select country</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label style="display: block; font-size: 0.875rem; font-weight: 500; color: var(--gray-600); margin-bottom: 0.5rem;">City</label>
                            <select id="city" required disabled style="width: 100%; padding: 0.75rem; border: 1px solid var(--gray-300); border-radius: var(--radius); font-size: 0.9375rem; background: var(--gray-100);">
                                <option value="">Select country first</option>
                            </select>
                        </div>
                    </div>

                    <h3 style="font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--gray-200);">🏠 Property Details</h3>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                        <div class="form-group">
                            <label style="display: block; font-size: 0.875rem; font-weight: 500; color: var(--gray-600); margin-bottom: 0.5rem;">Living Area (sq ft)</label>
                            <input type="number" id="sqft" min="100" max="50000" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--gray-300); border-radius: var(--radius); font-size: 0.9375rem;">
                        </div>
                        <div class="form-group">
                            <label style="display: block; font-size: 0.875rem; font-weight: 500; color: var(--gray-600); margin-bottom: 0.5rem;">Bedrooms</label>
                            <input type="number" id="bedrooms" min="0" max="20" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--gray-300); border-radius: var(--radius); font-size: 0.9375rem;">
                        </div>
                        <div class="form-group">
                            <label style="display: block; font-size: 0.875rem; font-weight: 500; color: var(--gray-600); margin-bottom: 0.5rem;">Bathrooms</label>
                            <input type="number" id="bathrooms" min="0.5" max="20" step="0.5" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--gray-300); border-radius: var(--radius); font-size: 0.9375rem;">
                        </div>
                        <div class="form-group">
                            <label style="display: block; font-size: 0.875rem; font-weight: 500; color: var(--gray-600); margin-bottom: 0.5rem;">Property Age (years)</label>
                            <input type="number" id="age" min="0" max="500" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--gray-300); border-radius: var(--radius); font-size: 0.9375rem;">
                        </div>
                    </div>

                    <h3 style="font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--gray-200);">✨ Features</h3>
                    
                    <div style="display: flex; gap: 2rem; margin-bottom: 2rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="checkbox" id="garage" style="width: 1.25rem; height: 1.25rem;">
                            <span>Has Garage</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="checkbox" id="pool" style="width: 1.25rem; height: 1.25rem;">
                            <span>Has Pool</span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-dark btn-large" style="width: 100%;">
                        Calculate Estimate
                    </button>
                </form>

                <!-- Results -->
                <div id="resultSection" class="hidden" style="background: var(--white); border-radius: var(--radius-xl); padding: 2.5rem; box-shadow: var(--shadow-lg); text-align: center;">
                    <div style="font-size: 1rem; color: var(--gray-500); margin-bottom: 0.5rem;">Estimated Property Value</div>
                    <div id="priceDisplay" style="font-size: 3rem; font-weight: 700; color: var(--primary); margin-bottom: 1rem;">--</div>
                    <div id="priceRange" style="color: var(--gray-500); margin-bottom: 0.5rem;">--</div>
                    <div id="confidence" style="font-size: 0.875rem; color: var(--gray-400); margin-bottom: 1.5rem;">--</div>
                    <div id="marketContext" style="padding-top: 1.5rem; border-top: 1px solid var(--gray-200);"></div>
                    <button onclick="resetForm()" class="btn btn-outline" style="margin-top: 1.5rem;">
                        Calculate Another
                    </button>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 EstatePredict. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/predict.js"></script>
</body>
</html>
